# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "gradle"
    assignees:
      - jumaallan
    directory: "/"
    schedule:
      interval: "weekly"
      time: "10:00"
      timezone: "America/Los_Angeles"
    ignore:
      # Ignore AndroidX updates as they may bump the minSDK version
      - dependency-name: "androidx.*"
      # Ignore AGP updates - we don't want to bump to AGP 9.0.0 on v11
      - dependency-name: "com.android.*"
      # Ignore Kotlin and related updates
      - dependency-name: "org.jetbrains.kotlin.*"
      - dependency-name: "com.google.devtools.ksp"
      - dependency-name: "dev.zacsweers.moshix"
      # Ignore Gradle wrapper updates
      - dependency-name: "gradle*"
      # Ignore Chucker updates as v4.3.1+ bumps the minSDK requirement
      - dependency-name: "com.github.chuckerteam.chucker:*"
    groups:
      # https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#groups
      # Group all patch and minor updates together
      all:
        update-types:
          - "patch"
          - "minor"
        patterns:
          - "*"
  - package-ecosystem: github-actions
    assignees:
      - jumaallan
    directory: /
    schedule:
      interval: "monthly"
      time: "10:00"
      timezone: "America/Los_Angeles"
    groups:
      github-actions:
        patterns:
          - "*"
